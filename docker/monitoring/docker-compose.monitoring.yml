# Self-contained Grafana + Prometheus monitoring stack for a ReactantServer node.
#
# It joins the SAME external Docker network as the server stack (default `netai02`, created by
# deploy.netai02.sh) so it can scrape the gateway's aggregated metrics endpoint by container name
# (`reactantserver:8002`). Independent lifecycle: bring this up/down without touching the server.
#
# Run via the helper:
#   sudo ./private/deploy/deploy.monitoring.sh up        # start (network must already exist)
#   sudo ./private/deploy/deploy.monitoring.sh logs -f
#   sudo ./private/deploy/deploy.monitoring.sh down
#
# Then browse Grafana at http://<host>:3000 (anonymous viewer enabled; admin / admin to edit) and
# Prometheus at http://<host>:9090.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: reactant-prometheus
    restart: unless-stopped
    networks: [shared]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: reactant-grafana
    restart: unless-stopped
    networks: [shared]
    depends_on: [prometheus]
    environment:
      # Internal test box: let anyone view without logging in; admin/admin to edit. Override
      # GF_SECURITY_ADMIN_PASSWORD for anything exposed beyond the lab network.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_DEFAULT_THEME: "dark"
      # Land on the Fleet Overview instead of the Grafana home page.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/fleet_overview.json"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  prometheus-data:
  grafana-data:

networks:
  # The server stack's shared, externally-created network (deploy.netai02.sh makes it). Name is
  # parameterized so this stack is reusable against any node; defaults to `netai02`.
  shared:
    name: ${REACTANTSERVER_NETWORK:-netai02}
    external: true
