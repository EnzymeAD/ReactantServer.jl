# Load every dashboard JSON under /var/lib/grafana/dashboards on startup (and hot-reload on change).
apiVersion: 1

providers:
  - name: ReactantServer
    orgId: 1
    folder: ReactantServer
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
