# Gateway config for the single-GPU soak stack (docker-compose.gpu2.yml). One worker on one node;
# the gateway discovers its served models via RepositoryIndex from the single endpoint.
listen:
  grpc: "0.0.0.0:8001"
  metrics: "0.0.0.0:8002"
# Request scheduling across workers. round_robin (default) spreads each model uniformly;
# lpt_packing concentrates each model's traffic on few workers from measured load and
# worker-reported compute cost, maximizing batch coalescing. lpt_packing requires worker
# scheduler.discipline: fifo (node file) and all models loaded on all workers.
# scheduling:
#   mode: lpt_packing         # round_robin | lpt_packing
#   rebalance_seconds: 15.0   # placement recompute interval
#   max_worker_share: 0.8     # max share of one worker a single model may claim
#   hysteresis: 0.1           # min improvement required to move a placement
grpc:
  max_recv_msg_bytes: 268435456
  max_send_msg_bytes: 268435456
logging:
  level: "info"
  format: "json"
endpoints:
  - "worker0:8080"
