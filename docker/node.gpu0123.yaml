# Four-GPU lpt_packing soak node config, mounted into the supervised all-in-one container
# (docker-compose.gpu0123.yml). The supervisor runs four workers (one per visible GPU, selected by
# CUDA_VISIBLE_DEVICES=0,1,2,3) plus the embedded gateway on 8001/8002. The gateway is put in
# lpt_packing mode via the REACTANT_GATEWAY_SCHEDULING_* environment in the compose file. That mode
# requires every worker to run the fifo or edf discipline (set below, so placement decisions stay with
# the gateway and the workers do not impose a competing per-model fairness policy) and to serve the
# identical model set (every worker loads every bundle in the repository, which is the default). This
# stack uses edf so in-flight meta sub-calls, which have already spent part of their deadline budget,
# are served ahead of fresh full-budget requests instead of starving at the deadline line.
#
# This is the no-replication setup: with the gateway's default_replicas: 1, lpt_packing places each
# model on ONE of the four GPUs (chosen by balancing memory and compute), so a model's weights live
# on a single card and its traffic concentrates there for batch coalescing. As in the two-GPU soak
# (node.gpu23.yaml), no `models:` map is needed; the on-demand weight cache (weight_cache_fraction)
# keeps each GPU memory-safe by loading weights lazily and evicting LRU within its auto-sized budget.
#
# These are NVIDIA T4 cards (~15.4 GiB usable each) and run the large detection input-shape variants
# (text_fuse_net_gpu up to 2816x2816), whose activation/autotune scratch is substantial. Rather than
# hand-tune a byte budget (the old 8 GiB guess that left ~2 GiB for activations), weight_cache_fraction
# 1.0 lets the worker measure that scratch at startup and size the cache to fit pinned + scratch +
# wiggle. The allocator stays BFC with preallocate on: one arena grabbed up front so activations,
# autotune/recompile scratch, and weight-cache reloads are all sub-allocated from it and never
# fragment the driver memory map.
# mem_fraction is 0.9, not higher: CUDA graphs / command buffers for the fixed set of compiled
# executables are instantiated in driver memory OUTSIDE this pool, and 0.95 starved the driver
# (RESOURCE_EXHAUSTED instantiating command buffers); 0.9 reserves ~1.3 GiB for them.
model_repo: /var/lib/reactantserver/models
base_port: 8080
# Per-worker Prometheus metrics port (metrics_base_port + worker index): worker0 -> 9100,
# worker1 -> 9101, worker2 -> 9102, worker3 -> 9103. The embedded gateway aggregates all four
# behind its own /metrics on 8002.
metrics_base_port: 9100

global:
  cache_dir: /var/cache/reactantserver
  runtime:
    backend: cuda
    # 0.9 of ~15.4 GiB is preallocated as the BFC arena, leaving ~1.3 GiB outside the pool for the CUDA
    # context and, critically, for instantiating the fixed set of CUDA graphs / command buffers (the
    # driver allocates these outside the XLA pool). 0.95 starved that and OOM'd on command-buffer
    # instantiation; lower it further (0.85) only if command-buffer OOM persists.
    mem_fraction: 0.9
    # Preallocate the arena up front so all sub-allocations (activations, autotune/recompile scratch,
    # weight-cache reloads) come from it and never fragment the driver memory map.
    preallocate: true
    allow_cpu_fallback: false
    # On-demand weight cache per GPU, sized as a fraction of the BFC arena. 1.0 (the default) lets
    # the worker use the whole arena for weights and auto-size at startup: it probes each model's
    # peak device usage, reserves that scratch plus a wiggle fraction, and gives the rest to the
    # on-demand cache (weights load lazily and evict LRU within it). This replaces the old hand-tuned
    # 8 GiB byte budget that existed only to leave room for the 2816x2816 detection scratch, which is
    # now measured directly. 0 would keep every weight resident.
    weight_cache_fraction: 1.0
    # Share the PINNED_SYSTEM host weight floor across all four worker subprocesses via POSIX shm
    # regions (keyed by model name + content digest) instead of each worker holding its own private
    # anonymous-RAM copy. Since every worker loads every bundle here, this collapses the host floor
    # from 4x to 1x the total weight bytes. The container's shared /dev/shm (ipc: host in the compose
    # file) carries the regions. Mode 660 rather than the default world-writable 666.
    shared_host_weights: true
    shared_host_weights_mode: "660"
  scheduler:
    # edf: earliest-deadline-first. lpt_packing accepts fifo or edf (neither imposes a competing
    # per-model fairness policy). edf behaves exactly like fifo while clients share one deadline, and
    # only diverges to promote requests with less budget left (the in-flight meta sub-calls), and to
    # shed work that cannot finish in time. Using different per-client deadlines for a model would
    # reorder its service and so affect cross-client fairness; uniform deadlines keep it fifo-like.
    discipline: edf             # fifo | edf under lpt_packing (placement decisions stay with the gateway)
    ema_halflife_seconds: 30.0
    max_queue_depth: 1024
  endpoints:
    host: 0.0.0.0

# Four workers, one per visible GPU. The supervisor assigns device i to worker i and sets that
# worker's own CUDA_VISIBLE_DEVICES, so each worker sees a single GPU at ordinal 0.
workers:
  - { name: worker0 }
  - { name: worker1 }
  - { name: worker2 }
  - { name: worker3 }
