# End-to-end test node: two replicated GPU workers. Consumed only by test/e2e/docker-compose.yml
# and the top-level `make e2e`. The gateway is configured separately (test/e2e/gateway.yml).
# Distinct from docker/node.yaml.
model_repo: /var/lib/reactantserver/models
base_port: 8080

global:
  cache_dir: /tmp/reactantserver-cache
  runtime:
    backend: cuda
    mem_fraction: 0.3          # modest, to coexist with other GPU tenants (e.g. Triton)
    preallocate: false         # grow on demand instead of claiming the pool up front
    allow_cpu_fallback: false  # a CUDA/GPU init failure should surface, not silently fall back
  endpoints:
    host: 0.0.0.0              # reachable from the gateway over the compose network

workers:
  - { name: worker0 }
  - { name: worker1 }

# Both models replicated on both workers, so the gateway load-balances round-robin.
models:
  scale4: [worker0, worker1]
  bit_resnet50: [worker0, worker1]
