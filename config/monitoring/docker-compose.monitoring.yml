# Self-contained Grafana + Prometheus monitoring stack for a ReactantServer node.
#
# The node runs natively on the host (not in a container), so Prometheus scrapes the host's metrics
# port rather than a container over a shared Docker network. The prometheus service maps
# `host.docker.internal` to the host gateway (`extra_hosts` below) and prometheus.yml targets
# `host.docker.internal:8002`. If your node listens on a remote host, edit that target in
# prometheus.yml instead. Independent lifecycle: bring this up/down without touching the server.
#
# Run it:
#   docker compose -f config/monitoring/docker-compose.monitoring.yml up -d
#   docker compose -f config/monitoring/docker-compose.monitoring.yml logs -f
#   docker compose -f config/monitoring/docker-compose.monitoring.yml down
#
# Then browse Grafana at http://<host>:3000 (anonymous viewer enabled; admin / admin to edit) and
# Prometheus at http://<host>:9090.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: reactant-prometheus
    restart: unless-stopped
    # Reach the natively-running node on the host. host-gateway resolves host.docker.internal to the
    # host from inside the container (Docker 20.10+); prometheus.yml targets host.docker.internal:8002.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: reactant-grafana
    restart: unless-stopped
    depends_on: [prometheus]
    environment:
      # Internal test box: let anyone view without logging in; admin/admin to edit. Override
      # GF_SECURITY_ADMIN_PASSWORD for anything exposed beyond the lab network.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_DEFAULT_THEME: "dark"
      # Land on the Fleet Overview instead of the Grafana home page.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/fleet_overview.json"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  prometheus-data:
  grafana-data:
