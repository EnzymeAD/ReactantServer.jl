# Zero-config default node file: `gpus: auto` with no workers list, so the supervisor detects the
# visible GPUs and spawns one worker per device (worker0..workerN-1, ports base_port+i), plus the
# embedded gateway on 8001 (gRPC) / 8002 (metrics, health). Point REACTANT_NODE_FILE at your own
# file to override anything here; see config/node.yaml for the fully commented multi-worker template
# (explicit workers lists, per-model device pinning, roles).

model_repo: /var/lib/reactantserver/models
base_port: 8080
metrics_base_port: 9100

# One worker per visible GPU. Also accepts an integer count or an explicit device list
# (ordinals or GPU UUIDs); the REACTANT_GPUS environment variable overrides this key.
gpus: auto

global:
  cache_dir: /var/cache/reactantserver
  runtime:
    backend: cuda
    # autotune (default true) enables XLA's GPU compile autotuner. Set false to compile with
    # xla_gpu_autotune_level=0 (default gemm/conv algorithm selection, no timing trials), which makes
    # kernel choice deterministic run-to-run and keeps the autotuner's compile-time scratch from
    # inflating the startup weight-cache memory probe on the first, un-cached start. The trade-off is
    # losing timing-tuned kernels.
    # autotune: true
    # numerics (default auto) sets the f32 matmul/convolution precision policy. 'auto' follows the
    # hardware: TF32 on GPUs that support it (compute capability >= 8.0), plain f32 elsewhere, so
    # the same bundle can produce different numerics on different GPU generations. 'f32' pins full
    # f32 everywhere (TF32 algorithms rewritten, precision_config=HIGHEST on f32 matmuls/convs,
    # NVIDIA_TF32_OVERRIDE=0): identical numerics across hardware, the mode for validated
    # deployments, at the cost of tensor-core throughput on TF32-capable GPUs. 'tf32' compiles
    # like 'auto' (TF32 permitted, kernels chosen by XLA/cuBLAS) but fails startup on hardware
    # that cannot run TF32, so a mixed fleet cannot silently serve divergent numerics.
    # numerics: auto
    mem_fraction: 0.9
    # Preallocate one BFC arena up front so every sub-allocation (activations, autotune/recompile
    # scratch, weight-cache reloads) is served from it and never fragments the driver memory map.
    # mem_fraction leaves the complement outside the pool for the CUDA context and command-buffer
    # (CUDA graph) instantiation.
    preallocate: true
    allow_cpu_fallback: false
    # On-demand weight cache, sized as a fraction of the BFC arena devoted to all weights (pinned +
    # on-demand). 1.0 (the default, GPU only) uses the whole arena and self-sizes at startup: the
    # worker probes each model's peak device usage, reserves that scratch plus the wiggle fraction
    # below and any pinned weights, and gives the rest to the on-demand cache (weights load lazily and
    # evict LRU within it). When everything fits, all weights stay resident. 0 disables the cache
    # (every weight resident, no probe).
    weight_cache_fraction: 1.0
    # Fraction of the arena kept free as anti-fragmentation slack; feeds the startup auto-sizing.
    weight_cache_wiggle_fraction: 0.1
  scheduler:
    ema_halflife_seconds: 30.0
    max_queue_depth: 1024
    # Worker-local memory compaction (standalone / no-gateway deployments). Every N on-demand
    # weight-cache loads, free the resident on-demand device weights so the BFC allocator coalesces
    # its free list (pinned models are loaded once at startup and left in place; freed models reload
    # lazily as requests arrive). 0 disables (the default), so a gateway-fronted worker never
    # self-compacts: behind a gateway, compaction is driven by the gateway instead. No-op when
    # weight_cache_fraction is 0 (nothing churns). Prefer larger intervals.
    compaction_interval: 0
  endpoints:
    host: 0.0.0.0
  # gRPC message-size limits, shared by every worker and mirrored into the embedded gateway by the
  # supervisor (so this one block sizes the whole node). Defaults to 512 MiB each; the 4 MiB gRPC
  # default is far below what inference tensors need. These are decode/encode caps, not allocations.
  # grpc:
  #   max_recv_msg_bytes: 536870912   # 512 MiB
  #   max_send_msg_bytes: 536870912
